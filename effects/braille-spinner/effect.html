<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>Braille Spinner · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.vp-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:22px}
.term-pill{
    font-family:'Geist Mono',monospace;font-size:16px;color:var(--ink);
    background:var(--paper-2);border:1px solid var(--line);border-radius:12px;
    padding:12px 22px;display:inline-flex;align-items:center;gap:6px;
  }
.spinner{display:inline-block;color:var(--ink)}
.spinner-elapsed{color:var(--ink-3);margin-left:6px;font-size:13px}
.term-label{color:var(--ink);font-family:'Geist Mono',monospace;font-size:14px}
.spinner-trace{
    font-family:'Geist Mono',monospace;font-size:11px;color:var(--ink-3);
    background:var(--paper-2);border:1px solid var(--line);
    border-radius:8px;padding:6px 12px;
  }
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="braille-spinner"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='vp-stage' style='flex-direction:column;gap:14px'>
      <div class='term-pill'>
        <span class='spinner' data-sp>⠋</span>
        <span class='term-label'>auditing contract</span>
        <span class='spinner-elapsed' data-el>3s</span>
      </div>
      <div class='spinner-trace'>● tool: solidity.parse → 12 findings</div>
    </div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "braille-spinner",
  "display": "Braille Spinner",
  "cat": "UI",
  "source": [
    "claude-code-goal",
    "claude-code-agent-view",
    "claude-code-push-notifications"
  ],
  "desc": "Ten-frame braille cycle with elapsed integer counter. Always-on indicator that scrubs cleanly.",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": false,
  "variables": {}
}
</script>
<script data-effect-init>
/* module-scope helpers carried over verbatim from dashboard/effects.js */
const BRAILLE = ["⠋","⠙","⠹","⠸","⠼","⠴","⠦","⠧","⠇","⠏"]

window.LUMIERE_INIT = function init(card) {
      const sp = card.querySelector("[data-sp]")
      const el = card.querySelector("[data-el]")
      let raf, start = performance.now()
      const loop = (now) => {
        const dt = (now - start) % 8000
        sp.textContent = BRAILLE[Math.floor(dt / 80) % 10]
        el.textContent = Math.floor(dt / 1000) + "s"
        raf = requestAnimationFrame(loop)
      }
      raf = requestAnimationFrame(loop)
      return () => {
        if (raf) cancelAnimationFrame(raf)
        start = performance.now()
        raf = requestAnimationFrame(loop)
      }
    }
</script>
<script src="../_runtime.js"></script>
</body>
</html>

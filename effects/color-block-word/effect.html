<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>Color Block Word · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.cbw-stage{position:absolute;inset:0;overflow:hidden;background:#fff}
.cbw-block{position:absolute;font-family:'Outfit',sans-serif;font-weight:800;color:#000;display:flex;align-items:center;justify-content:center;will-change:transform,opacity}
.cbw-block[data-cbw="now"]{width:56%;height:68%;top:10%;left:-2%;font-size:42px;background:#ededec;border-radius:14px}
.cbw-block[data-cbw="you"]{width:48%;height:54%;bottom:-4%;left:22%;font-size:38px;background:#d4f0c0;border-radius:14px;z-index:2}
.cbw-block[data-cbw="can"]{width:44%;height:48%;top:-2%;right:-4%;font-size:36px;background:#f5e86c;border-radius:14px;z-index:3}
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="color-block-word"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='cbw-stage'>
      <div class='cbw-block' data-cbw='now'>now</div>
      <div class='cbw-block' data-cbw='you'>you</div>
      <div class='cbw-block' data-cbw='can'>can</div>
    </div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "color-block-word",
  "display": "Color Block Word",
  "cat": "Reveal",
  "isNew": true,
  "source": [
    "chatgpt-personal-finance"
  ],
  "desc": "Large colored panels slide in from different edges carrying single bold words, overlapping in layers. ChatGPT 'now you can' collage pattern.",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": false,
  "variables": {}
}
</script>
<script data-effect-init>
window.LUMIERE_INIT = function init(card) {
      const now = card.querySelector("[data-cbw='now']")
      const you = card.querySelector("[data-cbw='you']")
      const can = card.querySelector("[data-cbw='can']")
      const all = [now, you, can]
      gsap.set(all, { opacity: 1, x: 0, y: 0, rotation: 0 })
      return () => {
        gsap.killTweensOf(all)
        gsap.set(now, { opacity: 0, x: -140, y: 20, rotation: -3 })
        gsap.set(you, { opacity: 0, x: 0, y: 100, rotation: 2 })
        gsap.set(can, { opacity: 0, x: 100, y: -80, rotation: 4 })
        gsap.to(now, { opacity: 1, x: 0, y: 0, rotation: 0, duration: 0.75, ease: "expo.out", delay: 0.3 })
        gsap.to(you, { opacity: 1, x: 0, y: 0, rotation: 0, duration: 0.75, ease: "expo.out", delay: 0.5 })
        gsap.to(can, { opacity: 1, x: 0, y: 0, rotation: 0, duration: 0.75, ease: "expo.out", delay: 0.7 })
      }
    }
</script>
<script src="../_runtime.js"></script>
</body>
</html>

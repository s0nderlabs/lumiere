<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>Bookend Rhyme · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.vp-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:22px}
.wm-sm{font-family:'CalSans',sans-serif;font-size:32px;color:var(--ink);letter-spacing:-0.022em;line-height:1}
.wm-sm.wm-muted{color:var(--ink-3)}
.wm-sm .char{display:inline-block}
.be-divider{height:1.5px;width:0;background:var(--ink-4);margin:0 auto;border-radius:1px}
.char-span{display:inline-block}
.char-span .char{display:none}
.char-span{display:inline-block}
.char-span > .char{display:inline-block}
.term-body .char-span{color:#e8e5dd}
.be-close{
    font-family:'Outfit',sans-serif;font-size:20px;color:var(--ink-2);
    font-weight:300;letter-spacing:-0.01em;text-align:center;
    line-height:1.2;
  }
.be-close .bl-word{display:inline-block}
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="bookend-rhyme"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='vp-stage' style='flex-direction:column;gap:22px;align-items:center'>
      <div class='wm-sm char-span' data-be-in>lumiere.</div>
      <div class='be-divider'></div>
      <div class='be-close' data-be-out>ships today.</div>
    </div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "bookend-rhyme",
  "display": "Bookend Rhyme",
  "cat": "Text",
  "source": [
    "claude-code-goal",
    "claude-code-ultrareview",
    "claude-financial-services",
    "code-w-claude-conf"
  ],
  "desc": "Opening and closing beats share the same per-char rise treatment with a slower closing stagger. Different content; matched motion makes the close feel like a return to the open.",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": false,
  "variables": {}
}
</script>
<script data-effect-init>
/* module-scope helpers carried over verbatim from dashboard/effects.js */
function spanChars(el) {
  const text = el.textContent
  el.innerHTML = ""
  const spans = []
  for (const ch of text) {
    const s = document.createElement("span")
    s.className = "char"
    s.textContent = ch === " " ? "\u00A0" : ch
    s.style.display = "inline-block"
    el.appendChild(s)
    spans.push(s)
  }
  return spans
}

function splitWords(el) {
  const text = el.textContent
  el.innerHTML = text
    .split(" ")
    .map(w => `<span class="bl-word" style="display:inline-block;margin-right:.25em">${w}</span>`)
    .join(" ")
  return el.querySelectorAll(".bl-word")
}

window.LUMIERE_INIT = function init(card) {
      const a = card.querySelector("[data-be-in]")
      const b = card.querySelector("[data-be-out]")
      const div = card.querySelector(".be-divider")
      const aS = spanChars(a)
      const bW = splitWords(b)
      /* idle: everything visible, divider at full wordmark width */
      gsap.set(aS, { opacity: 1, y: 0 })
      gsap.set(bW, { opacity: 1, y: 0 })
      const wmWidth = () => a.offsetWidth || 160
      gsap.set(div, { width: wmWidth() })
      return () => {
        gsap.killTweensOf([...aS, ...bW, div])
        gsap.set(aS, { opacity: 0, y: 60 })
        gsap.set(bW, { opacity: 0, y: 30 })
        gsap.set(div, { width: 0 })
        /* OPEN: wordmark rises per-char */
        gsap.to(aS, { opacity: 1, y: 0, duration: 0.7, ease: "expo.out", stagger: 0.07, delay: 0.25 })
        /* divider draws out to underline the wordmark after it lands */
        gsap.to(div, { width: wmWidth(), duration: 0.6, ease: "power3.out", delay: 1.1 })
        /* CLOSE: tagline rises per-word */
        gsap.to(bW, { opacity: 1, y: 0, duration: 0.9, ease: "expo.out", stagger: 0.22, delay: 1.85 })
      }
    }
</script>
<script src="../_runtime.js"></script>
</body>
</html>

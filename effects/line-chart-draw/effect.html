<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>Line Chart Draw · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.nav-item.active{background:var(--ink);color:var(--cream)}
.nav-item.active .count{color:rgba(249,248,246,0.7)}
html.theme-dark .nav-item.active .count{color:rgba(16,15,9,0.65)}
.theme-toggle button.active{background:var(--ink);color:var(--cream);box-shadow:0 8px 18px -10px rgba(16,15,9,0.45)}
.filter-chip.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.lcd-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;padding:12px}
.lcd-card{background:#fff;border-radius:16px;padding:12px 14px;width:90%;box-shadow:0 4px 16px -6px rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.04)}
.lcd-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1px;font-family:'Outfit',sans-serif}
.lcd-title{font-size:10px;font-weight:600;color:#222}
.lcd-val{font-size:14px;font-weight:700;color:#000}
.lcd-gain{font-size:8px;color:#22c55e;font-weight:500;font-family:'Outfit',sans-serif}
.lcd-tabs{display:flex;gap:3px;margin:6px 0;font-family:'Outfit',sans-serif;font-size:7.5px;color:#aaa}
.lcd-tab{padding:2px 5px;border-radius:999px;cursor:pointer;font-weight:500}
.lcd-tab.active{background:#f0efed;color:#222;font-weight:600}
.lcd-svg{width:100%;height:56px}
.lcd-line{fill:none;stroke:#22c55e;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.lcd-fill{fill:url(#lcd-grad);opacity:0.25}
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="line-chart-draw"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='lcd-stage'>
      <div class='lcd-card'>
        <div class='lcd-header'><span class='lcd-title'>Investment performance</span><span class='lcd-val'>$53,399</span></div>
        <div class='lcd-gain'>+$487.23 (+2.73%) YTD</div>
        <div class='lcd-tabs'><span class='lcd-tab'>1D</span><span class='lcd-tab'>1W</span><span class='lcd-tab'>1M</span><span class='lcd-tab'>3M</span><span class='lcd-tab'>6M</span><span class='lcd-tab active'>YTD</span><span class='lcd-tab'>1Y</span></div>
        <svg class='lcd-svg' viewBox='0 0 200 60' preserveAspectRatio='none' data-lcd-svg>
          <defs><linearGradient id='lcd-grad' x1='0' y1='0' x2='0' y2='1'><stop offset='0%' stop-color='#2e9b66' stop-opacity='0.3'/><stop offset='100%' stop-color='#2e9b66' stop-opacity='0'/></linearGradient></defs>
          <path class='lcd-fill' data-lcd-fill d='M0,45 10,42 25,48 40,50 55,46 70,44 85,38 100,40 115,35 130,30 145,28 160,25 175,18 190,20 200,15 200,60 0,60Z'/>
          <path class='lcd-line' data-lcd-line d='M0,45 10,42 25,48 40,50 55,46 70,44 85,38 100,40 115,35 130,30 145,28 160,25 175,18 190,20 200,15'/>
        </svg>
      </div>
    </div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "line-chart-draw",
  "display": "Line Chart Draw",
  "cat": "Data Viz",
  "isNew": true,
  "source": [
    "chatgpt-personal-finance"
  ],
  "desc": "SVG line chart draws left-to-right with gradient fill following. ChatGPT investment performance card.",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": false,
  "variables": {}
}
</script>
<script data-effect-init>
window.LUMIERE_INIT = function init(card) {
      const line = card.querySelector("[data-lcd-line]")
      const fill = card.querySelector("[data-lcd-fill]")
      const len = line.getTotalLength ? line.getTotalLength() : 400
      gsap.set(line, { strokeDasharray: len, strokeDashoffset: 0 })
      gsap.set(fill, { opacity: 0.3 })
      return () => {
        gsap.killTweensOf([line, fill])
        gsap.set(line, { strokeDasharray: len, strokeDashoffset: len })
        gsap.set(fill, { opacity: 0, clipPath: "inset(0 100% 0 0)" })
        gsap.to(line, { strokeDashoffset: 0, duration: 1.2, ease: "power2.inOut", delay: 0.5 })
        gsap.to(fill, { opacity: 0.3, clipPath: "inset(0 0% 0 0)", duration: 1.2, ease: "power2.inOut", delay: 0.5 })
      }
    }
</script>
<script src="../_runtime.js"></script>
</body>
</html>

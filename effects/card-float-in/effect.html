<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>Card Float-In · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.cfi-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#fafaf8;padding:14px}
.cfi-card{background:#fff;border-radius:16px;box-shadow:0 4px 20px -8px rgba(0,0,0,0.08);border:1px solid rgba(0,0,0,0.04);padding:14px 16px;width:80%;font-family:'Outfit',sans-serif}
.cfi-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.cfi-title{font-size:11.5px;font-weight:600;color:#111}
.cfi-sub{font-size:8px;color:#aaa;margin-bottom:10px;font-weight:400}
.cfi-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:10px;color:#444;border-top:1px solid rgba(0,0,0,0.03)}
.cfi-row:first-of-type{border-top:none}
.cfi-icon{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8.5px;color:#fff;font-weight:600}
.cfi-row-name{flex:1;font-weight:500}
.cfi-row-val{font-weight:600;color:#111;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="card-float-in"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='cfi-stage'>
      <div class='cfi-card' data-cfi>
        <div class='cfi-header'><span class='cfi-title'>Upcoming payments</span></div>
        <div class='cfi-sub'>Next 10 days</div>
        <div class='cfi-row'><div class='cfi-icon' style='background:#3a7ad0'>D</div><div class='cfi-row-name'>Dahl Bank</div><div class='cfi-row-val'>$1,354</div></div>
        <div class='cfi-row'><div class='cfi-icon' style='background:#8b6c4a'>R</div><div class='cfi-row-name'>Rice Flower Co-op</div><div class='cfi-row-val'>$99.99</div></div>
        <div class='cfi-row'><div class='cfi-icon' style='background:#e8a0b0'>Y</div><div class='cfi-row-name'>Go-Go Yoga</div><div class='cfi-row-val'>$65.00</div></div>
      </div>
    </div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "card-float-in",
  "display": "Card Float-In",
  "cat": "UI",
  "isNew": true,
  "source": [
    "claude-financial-services",
    "chatgpt-personal-finance"
  ],
  "desc": "White rounded card gently floats upward with fade + subtle scale. ChatGPT-style data card entrance.",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": false,
  "variables": {}
}
</script>
<script data-effect-init>
window.LUMIERE_INIT = function init(card) {
      const c = card.querySelector("[data-cfi]")
      const rows = c.querySelectorAll(".cfi-row")
      gsap.set(c, { opacity: 1, y: 0, scale: 1 })
      gsap.set(rows, { opacity: 1, x: 0 })
      return () => {
        gsap.killTweensOf([c, ...rows])
        gsap.set(c, { opacity: 0, y: 24, scale: 0.97 })
        gsap.set(rows, { opacity: 0, y: 8 })
        gsap.to(c, { opacity: 1, y: 0, scale: 1, duration: 0.65, ease: "expo.out", delay: 0.5 })
        rows.forEach((r, i) => {
          gsap.to(r, { opacity: 1, y: 0, duration: 0.35, ease: "power2.out", delay: 0.85 + i * 0.12 })
        })
      }
    }
</script>
<script src="../_runtime.js"></script>
</body>
</html>

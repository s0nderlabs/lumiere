<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>Wordmark Rise · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.vp-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:22px}
.wm-mid{font-family:'CalSans',sans-serif;font-size:48px;color:var(--ink);letter-spacing:-0.025em;line-height:1}
.wm-mid .char{display:inline-block}
.char-span{display:inline-block}
.char-span .char{display:none}
.char-span{display:inline-block}
.char-span > .char{display:inline-block}
.term-body .char-span{color:#e8e5dd}
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="wordmark-rise"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='vp-stage'><div class='wm-mid char-span' data-wm>lumiere</div></div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "wordmark-rise",
  "display": "Wordmark Rise",
  "cat": "Text",
  "source": [
    "claude-code-agent-view",
    "claude-code-push-notifications"
  ],
  "desc": "Per-character rise with larger y-distance and slower stagger. For brand moments that need weight.",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": false,
  "variables": {}
}
</script>
<script data-effect-init>
/* module-scope helpers carried over verbatim from dashboard/effects.js */
function spanChars(el) {
  const text = el.textContent
  el.innerHTML = ""
  const spans = []
  for (const ch of text) {
    const s = document.createElement("span")
    s.className = "char"
    s.textContent = ch === " " ? "\u00A0" : ch
    s.style.display = "inline-block"
    el.appendChild(s)
    spans.push(s)
  }
  return spans
}

window.LUMIERE_INIT = function init(card) {
      const el = card.querySelector("[data-wm]")
      const spans = spanChars(el)
      gsap.set(spans, { opacity: 1, y: 0 })
      return () => {
        gsap.killTweensOf(spans)
        gsap.set(spans, { opacity: 0, y: 60 })
        gsap.to(spans, { opacity: 1, y: 0, duration: 0.7, ease: "expo.out", stagger: 0.07, delay: 0.25 })
      }
    }
</script>
<script src="../_runtime.js"></script>
</body>
</html>

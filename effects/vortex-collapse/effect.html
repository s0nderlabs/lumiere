<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>Vortex Collapse · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.stack{position:relative;width:100%;height:100%}
.mini-card{
    position:absolute;background:var(--paper-2);border:1px solid var(--line-strong);
    border-radius:10px;padding:9px 13px;
    font-family:'Outfit',sans-serif;font-size:12px;color:var(--ink);
    box-shadow:0 18px 38px -20px rgba(0,0,0,0.4);
  }
.mini-card .lbl{font-family:'Geist Mono',monospace;font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.12em;display:block;margin-bottom:3px}
.mini-card .val{font-weight:500;font-size:13px;display:block}
.flip-card .lbl{font-family:'Geist Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-3);margin-bottom:3px}
.flip-card .val{font-weight:500;font-size:13px;color:var(--ink)}
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="vortex-collapse"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='stack'>
      <div class='mini-card' data-v='0' style='left:6%;top:14%'><span class='lbl'>identity</span><span class='val'>anima.id</span></div>
      <div class='mini-card' data-v='1' style='left:50%;top:8%'><span class='lbl'>brain</span><span class='val'>memory</span></div>
      <div class='mini-card' data-v='2' style='left:2%;top:58%'><span class='lbl'>balance</span><span class='val'>$0.62</span></div>
      <div class='mini-card' data-v='3' style='left:34%;top:64%'><span class='lbl'>signal</span><span class='val'>3 channels</span></div>
      <div class='mini-card' data-v='4' style='left:62%;top:44%'><span class='lbl'>sandbox</span><span class='val'>vm-warm</span></div>
    </div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "vortex-collapse",
  "display": "Vortex Collapse",
  "cat": "Reveal",
  "source": [
    "anima-launch"
  ],
  "desc": "All elements drift toward a shared origin and fade. Sweep N elements out before a hard scene change.",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": false,
  "variables": {}
}
</script>
<script data-effect-init>
window.LUMIERE_INIT = function init(card) {
      const cards = card.querySelectorAll("[data-v]")
      const drifts = [{ dx: 80, dy: 50 }, { dx: -20, dy: 60 }, { dx: 90, dy: -20 }, { dx: -15, dy: -25 }, { dx: -50, dy: -10 }]
      const rots = [+2, -2, +3, -3, -2]
      const settle = () => cards.forEach((c, i) => gsap.set(c, { x: 0, y: 0, scale: 0.92, rotation: rots[i], opacity: 1 }))
      settle()
      return () => {
        gsap.killTweensOf(cards)
        settle()
        const tl = gsap.timeline()
        cards.forEach((c, i) => {
          tl.to(c, { x: drifts[i].dx, y: drifts[i].dy, scale: 0.18, opacity: 0, duration: 1.05, ease: "power3.in" }, 0.4)
        })
        tl.call(() => settle(), null, "+=0.5")
      }
    }
</script>
<script src="../_runtime.js"></script>
</body>
</html>

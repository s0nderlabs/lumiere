<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>Dot / Hatch Brand Surface · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.dgs-stage{
    position:absolute;inset:0;
    border-radius:14px;
    overflow:hidden;
    background:var(--vp-bg);
  }
.dgs-field{
    position:absolute;inset:0;
    background:
      radial-gradient(120% 120% at 50% -10%, rgba(242,237,228,0.55), rgba(242,237,228,0) 70%),
      var(--cream-warm);
  }
html.theme-dark .dgs-field{
    background:
      radial-gradient(130% 130% at 50% 0%, rgba(58,53,44,0.0), rgba(0,0,0,0.45) 100%),
      #15140f;
  }
.dgs-dots{
    position:absolute;inset:0;
    background-image:radial-gradient(circle, rgba(16,15,9,0.10) 1px, transparent 1.2px);
    background-size:18px 18px;
    background-position:9px 9px;
  }
html.theme-dark .dgs-dots{
    background-image:radial-gradient(circle, rgba(58,53,44,0.55) 1px, transparent 1.2px);
  }
.dgs-hatch{
    position:absolute;inset:0;
    background-image:repeating-linear-gradient(45deg,
      rgba(45,42,34,0.16) 0 1px, transparent 1px 4px);
    -webkit-mask-image:radial-gradient(140% 120% at 118% 118%, #000 38%, transparent 64%);
    mask-image:radial-gradient(140% 120% at 118% 118%, #000 38%, transparent 64%);
    opacity:1;
  }
html.theme-dark .dgs-hatch{
    background-image:repeating-linear-gradient(45deg,
      rgba(228,222,210,0.10) 0 1px, transparent 1px 4px);
  }
.dgs-frame{
    position:absolute;inset:10px;
    border:1px solid var(--line-strong);
    border-radius:10px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.30),
      inset 0 0 38px -14px rgba(50,35,22,0.40);
    will-change:transform;
  }
html.theme-dark .dgs-frame{
    box-shadow:
      inset 0 1px 0 rgba(239,236,227,0.05),
      inset 0 0 46px -10px rgba(0,0,0,0.7);
  }
.dgs-corner{
    position:absolute;width:9px;height:9px;
    border:1px solid var(--ink-2);
    z-index:2;
  }
.dgs-c-tl{top:14px;left:14px;border-right:none;border-bottom:none;border-top-left-radius:3px}
.dgs-c-tr{top:14px;right:14px;border-left:none;border-bottom:none;border-top-right-radius:3px}
.dgs-c-bl{bottom:14px;left:14px;border-right:none;border-top:none;border-bottom-left-radius:3px}
.dgs-c-br{bottom:14px;right:14px;border-left:none;border-top:none;border-bottom-right-radius:3px}
.dgs-cap{
    position:absolute;left:18px;bottom:18px;z-index:3;
    display:flex;align-items:center;gap:7px;
    font-family:'Geist Mono',monospace;
    font-size:8px;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--ink-3);
  }
.dgs-dot-mark{
    width:6px;height:6px;border-radius:50%;
    background:#15140f;
    box-shadow:0 0 0 2px rgba(242,237,228,0.6);
  }
html.theme-dark .dgs-dot-mark{
    background:#E4DED2;
    box-shadow:0 0 0 2px rgba(21,20,15,0.7);
  }
.dgs-cap-txt{line-height:1}
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="dot-grid-surface"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='dgs-stage' data-dgs='stage'>
    <div class='dgs-field' data-dgs='field'></div>
    <div class='dgs-dots' data-dgs='dots'></div>
    <div class='dgs-hatch' data-dgs='hatch'></div>
    <div class='dgs-frame' data-dgs='frame'></div>
    <span class='dgs-corner dgs-c-tl'></span>
    <span class='dgs-corner dgs-c-tr'></span>
    <span class='dgs-corner dgs-c-bl'></span>
    <span class='dgs-corner dgs-c-br'></span>
    <div class='dgs-cap' data-dgs='cap'>
      <span class='dgs-dot-mark'></span>
      <span class='dgs-cap-txt'>surface · dot 18 · hatch 45&deg;</span>
    </div>
  </div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "dot-grid-surface",
  "display": "Dot / Hatch Brand Surface",
  "cat": "Layer",
  "isNew": true,
  "source": [
    "claude-code-goal",
    "claude-code-push-notifications",
    "claude-code-ultrareview",
    "claude-code-session-recaps",
    "code-w-claude-conf"
  ],
  "desc": "The canonical s0nderlabs/Claude resting bed: a low-contrast dot-grid paper field with a 45deg riso line-hatch region and a rounded inner frame; replay blooms the textures in. From the Claude Code feature reels + Code w/ Claude conference poster.",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": true,
  "variables": {}
}
</script>
<script data-effect-init>
window.LUMIERE_INIT = function init(card) {
    const stage = card.querySelector('[data-dgs="stage"]')
    const field = card.querySelector('[data-dgs="field"]')
    const dots  = card.querySelector('[data-dgs="dots"]')
    const hatch = card.querySelector('[data-dgs="hatch"]')
    const frame = card.querySelector('[data-dgs="frame"]')
    const cap   = card.querySelector('[data-dgs="cap"]')
    const corners = card.querySelectorAll('.dgs-corner')

    function rest() {
      gsap.set(field, { opacity: 1 })
      gsap.set(dots,  { opacity: 1, backgroundSize: "18px 18px" })
      gsap.set(hatch, { opacity: 1, clipPath: "polygon(0 100%, 100% 100%, 100% 0, 0 0)" })
      gsap.set(frame, { opacity: 1, scale: 1 })
      gsap.set(corners, { opacity: 0.7, scale: 1 })
      gsap.set(cap,   { opacity: 1, y: 0 })
    }
    rest()

    return () => {
      gsap.killTweensOf([field, dots, hatch, frame, cap, ...corners])
      // hidden start
      gsap.set(field, { opacity: 0 })
      gsap.set(dots,  { opacity: 0, backgroundSize: "30px 30px" })
      gsap.set(hatch, { opacity: 0, clipPath: "polygon(0 100%, 0 100%, 0 100%, 0 100%)" })
      gsap.set(frame, { opacity: 0, scale: 1.04 })
      gsap.set(corners, { opacity: 0, scale: 0.4 })
      gsap.set(cap,   { opacity: 0, y: 6 })

      const tl = gsap.timeline({ defaults: { ease: "power3.out" } })
      tl.to(field, { opacity: 1, duration: 0.5 }, 0.15)
      tl.to(dots,  { opacity: 1, backgroundSize: "18px 18px", duration: 0.9, ease: "expo.out" }, 0.25)
      tl.to(hatch, { opacity: 1, clipPath: "polygon(0 100%, 100% 100%, 100% 0, 0 0)", duration: 0.85, ease: "power4.inOut" }, 0.45)
      tl.to(frame, { opacity: 1, scale: 1, duration: 0.7, ease: "power3.out" }, 0.55)
      tl.to(corners, { opacity: 0.7, scale: 1, duration: 0.45, ease: "back.out(2.2)", stagger: 0.07 }, 0.75)
      tl.to(cap, { opacity: 1, y: 0, duration: 0.5, ease: "expo.out" }, 1.0)
      return tl
    }
  }
</script>
<script src="../_runtime.js"></script>
</body>
</html>

<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>Confetti Success Burst · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.cfb-stage{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
.cfb-confetti{
    position:absolute;left:50%;top:44%;width:0;height:0;
    pointer-events:none;z-index:2;
  }
.cfb-piece{
    position:absolute;left:0;top:0;border-radius:1px;
    will-change:transform,opacity;
  }
.cfb-modal{
    position:relative;z-index:1;
    display:flex;flex-direction:column;align-items:center;gap:7px;
    padding:18px 26px 16px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:16px;
    box-shadow:var(--shadow-card);
    text-align:center;
  }
.cfb-check{
    width:40px;height:40px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:#73D9AA;
    box-shadow:0 6px 16px -8px rgba(115,217,170,0.8);
  }
.cfb-title{
    font-family:'Outfit',sans-serif;font-weight:600;font-size:14px;
    letter-spacing:-0.01em;color:var(--ink);
  }
.cfb-sub{
    font-family:'Geist Mono',monospace;font-size:9.5px;
    letter-spacing:0.02em;color:var(--ink-3);
  }
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="confetti-burst"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='cfb-stage'>
    <div class='cfb-confetti' data-cfb-layer></div>
    <div class='cfb-modal' data-cfb-modal>
      <div class='cfb-check'>
        <svg viewBox='0 0 24 24' width='22' height='22' aria-hidden='true'>
          <path d='M5 12.5 L10 17.5 L19 7' fill='none' stroke='#fff' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round'/>
        </svg>
      </div>
      <div class='cfb-title'>Filing complete</div>
      <div class='cfb-sub'>10-K packaged &middot; 0 exceptions</div>
    </div>
  </div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "confetti-burst",
  "display": "Confetti Success Burst",
  "cat": "Motion",
  "isNew": true,
  "source": [
    "claude-financial-services"
  ],
  "desc": "Brand-colored confetti erupts from top-center with launch-then-gravity physics and per-piece tumble, synced to a success modal. Claude for Financial Services payoff beat.",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": true,
  "variables": {}
}
</script>
<script data-effect-init>
window.LUMIERE_INIT = function init(card) {
    const layer = card.querySelector("[data-cfb-layer]")
    const modal = card.querySelector("[data-cfb-modal]")
    const COLORS = ["#CF6F57", "#73D9AA", "#15140F"]
    const N = 42

    // deterministic pseudo-random so scrubbing is stable across replays
    const rng = (seed) => { const x = Math.sin(seed * 99.13 + 4.7) * 43758.5453; return x - Math.floor(x) }
    const lerp = (a, b, t) => a + (b - a) * t

    // build the piece pool once
    layer.innerHTML = ""
    const pieces = []
    for (let i = 0; i < N; i++) {
      const p = document.createElement("div")
      p.className = "cfb-piece"
      const r1 = rng(i + 1), r2 = rng(i + 11), r3 = rng(i + 23)
      const tall = r3 > 0.5
      p.style.width = (tall ? 4 : 7) + "px"
      p.style.height = (tall ? 7 : 4) + "px"
      p.style.background = COLORS[i % COLORS.length]
      layer.appendChild(p)
      pieces.push({
        el: p,
        seedX: i,
        // symmetric, center-dense: cube-ish falloff keeps the core tight, tails reach the card edges
        launchX: Math.sign(r1 * 2 - 1) * Math.pow(Math.abs(r1 * 2 - 1), 1.4) * 150,
        // origin sits at card center (top:44%); eruption apex lands just below the top edge, in frame
        launchY: lerp(-90, -38, r2),
        fall: lerp(205, 280, r3),
        spin0: lerp(0, 360, r1),
        spinDrift: (r2 > 0.5 ? 1 : -1) * lerp(160, 420, r3),
        sway: (r1 > 0.5 ? 1 : -1) * lerp(14, 46, r2),
        riseDur: lerp(0.42, 0.56, r3),
        delay: r2 * 0.09
      })
    }
    const els = pieces.map(p => p.el)

    const restPieces = () => { gsap.set(els, { x: 0, y: 0, rotation: 0, autoAlpha: 0 }) }
    const restModal  = () => { gsap.set(modal, { autoAlpha: 1, y: 0, scale: 1 }) }

    // contentful rest: success modal visible, confetti cleared
    restPieces()
    restModal()

    return function replay() {
      gsap.killTweensOf(els)
      gsap.killTweensOf(modal)
      restPieces()
      gsap.set(modal, { autoAlpha: 0, y: 14, scale: 0.9 })

      const tl = gsap.timeline()
      // modal lands first
      tl.to(modal, { autoAlpha: 1, y: 0, scale: 1, duration: 0.42, ease: "back.out(1.7)" }, 0.1)

      // burst keyed to the modal settle - densest at t0
      const t0 = 0.42
      pieces.forEach((p) => {
        const a = t0 + p.delay
        // phase 1: launch up + outward
        tl.to(p.el, { autoAlpha: 1, duration: 0.01 }, a)
        tl.to(p.el, {
          x: p.launchX, y: p.launchY, rotation: p.spin0,
          duration: p.riseDur, ease: "power2.out"
        }, a)
        // phase 2: gravity fall + tumble + sway + fade (overlaps the rise apex)
        tl.to(p.el, {
          x: p.launchX + p.sway,
          y: p.launchY + p.fall,
          rotation: p.spin0 + p.spinDrift,
          autoAlpha: 0,
          duration: 1.15, ease: "power1.in"
        }, a + p.riseDur - 0.08)
      })

      // ensure a clean cleared rest at the end
      tl.add(restPieces)
      return tl
    }
  }
</script>
<script src="../_runtime.js"></script>
</body>
</html>

<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>Lift and Scale · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.vp-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:22px}
.receipt{
    background:var(--paper);border:1px solid var(--line);border-radius:12px;
    padding:16px 22px;width:240px;
    box-shadow:0 18px 40px -22px rgba(50,35,22,0.32);
  }
html.theme-dark .receipt{box-shadow:0 18px 40px -22px rgba(0,0,0,0.6)}
.receipt-label{
    font-family:'Geist Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:0.18em;
    color:var(--ink-3);
  }
.receipt-hash{
    font-family:'Geist Mono',monospace;font-size:13px;color:var(--ink);margin-top:6px;
  }
.receipt-row{
    display:flex;justify-content:space-between;align-items:baseline;
    margin-top:14px;padding-top:10px;border-top:1px solid var(--line);
  }
.receipt-k{font-family:'Geist Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-3)}
.receipt-v{font-family:'Outfit',sans-serif;font-weight:500;font-size:14px;color:var(--ink);letter-spacing:-0.005em}
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="lift-and-scale"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='vp-stage'><div class='receipt' data-lift>
      <div class='receipt-label'>proof</div>
      <div class='receipt-hash'>0xa7c2…34af</div>
      <div class='receipt-row'>
        <span class='receipt-k'>block</span>
        <span class='receipt-v'>18,433,221</span>
      </div>
    </div></div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "lift-and-scale",
  "display": "Lift and Scale",
  "cat": "Camera",
  "source": [
    "claude-code-fast-mode",
    "claude-code-goal",
    "claude-code-agent-view",
    "claude-code-ultrareview",
    "claude-financial-services"
  ],
  "desc": "Default entrance for any panel, card, or modal. Y-lift from below plus a subtle scale-up. Weighty enough to feel intentional, not just a fade.",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": false,
  "variables": {}
}
</script>
<script data-effect-init>
window.LUMIERE_INIT = function init(card) {
      const t = card.querySelector("[data-lift]")
      gsap.set(t, { opacity: 1, y: 0, scale: 1 })
      return () => {
        gsap.killTweensOf(t)
        gsap.fromTo(
          t,
          { opacity: 0, y: 56, scale: 0.9, transformOrigin: "50% 100%" },
          { opacity: 1, y: 0, scale: 1, duration: 0.95, ease: "expo.out", delay: 0.2, immediateRender: false }
        )
      }
    }
</script>
<script src="../_runtime.js"></script>
</body>
</html>

<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>Decelerated Stream · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.vp-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:22px}
.stream-frame{
    width:80%;max-width:340px;
    background:var(--paper);border:1px solid var(--line);border-radius:12px;
    padding:14px;font-family:'Geist Mono',monospace;font-size:10px;color:var(--ink-2);
    height:200px;overflow:hidden;
  }
.stream-frame > div{line-height:1.6}
.sline{line-height:1.7;font-family:'Geist Mono',monospace;font-size:10px;color:var(--ink-2)}
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="decelerated-stream"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='vp-stage'><div data-stream class='stream-frame'></div></div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "decelerated-stream",
  "display": "Decelerated Stream",
  "cat": "Reveal",
  "source": [
    "anima-launch"
  ],
  "desc": "Lines blast in at high cadence then decelerate to a steady finish. Reads as load + settle.",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": false,
  "variables": {}
}
</script>
<script data-effect-init>
window.LUMIERE_INIT = function init(card) {
      const cont = card.querySelector("[data-stream]")
      const lines = [
        "@clack:0 init",
        "@clack:1 brain · ok",
        "@clack:2 ledger · ok",
        "@clack:3 sigs · ok",
        "@clack:4 subname · ok",
        "@clack:5 mint · ok",
        "@clack:6 cache · ok",
        "@clack:7 wallet · ok",
        "@clack:8 manifest · ok",
        "@clack:9 verify · ok",
        "@clack:10 publish · ok",
        "@clack:11 → ready ✓"
      ]
      cont.innerHTML = lines.map(t => `<div class='sline'>${t}</div>`).join("")
      const els = cont.querySelectorAll(".sline")
      /* idle: all visible (end state of the stream) */
      gsap.set(els, { opacity: 1, y: 0 })
      return () => {
        gsap.killTweensOf(els)
        /* start hidden - stream them IN one by one */
        gsap.set(els, { opacity: 0, y: 4 })
        const tl = gsap.timeline()
        els.forEach((el, i) => {
          /* first 9 lines blast in fast (0.06s gaps), last 3 decelerate (0.22s gaps) */
          const t = i < 9 ? i * 0.06 : 0.54 + (i - 9) * 0.22
          tl.to(el, { opacity: 1, y: 0, duration: 0.18, ease: "power2.out" }, t)
        })
      }
    }
</script>
<script src="../_runtime.js"></script>
</body>
</html>

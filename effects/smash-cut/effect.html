<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>Smash Cut · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.vp-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:22px}
.scene-mock{
    position:absolute;inset:0;
    background:var(--paper);border:1px solid var(--line);border-radius:12px;
    padding:18px 22px;
    display:flex;flex-direction:column;justify-content:space-between;
    box-shadow:0 12px 28px -22px rgba(0,0,0,0.4);
  }
.scene-mock.scene-warm{background:var(--cream-warm);border-color:var(--line-strong)}
html.theme-dark .scene-mock.scene-warm{background:#2a2419}
.scene-tag{
    font-family:'Geist Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.18em;
    color:var(--ink-3);
  }
.scene-body{
    font-family:'Outfit',sans-serif;font-size:16px;color:var(--ink);font-weight:400;letter-spacing:-0.01em;
  }
.cut-flash{
    position:absolute;inset:0;background:var(--cream);opacity:0;
    pointer-events:none;border-radius:12px;
  }
html.theme-dark .cut-flash{background:var(--ink)}
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="smash-cut"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='vp-stage'>
      <div style='position:relative;width:80%;height:170px'>
        <div data-old class='scene-mock scene-a'>
          <div class='scene-tag'>before</div>
          <div class='scene-body'>$ analyzing reference…</div>
        </div>
        <div data-new class='scene-mock scene-warm' style='opacity:0'>
          <div class='scene-tag'>after</div>
          <div class='scene-body'>✓ 0xa7…34af · proof landed</div>
        </div>
        <div data-flash class='cut-flash'></div>
      </div>
    </div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "smash-cut",
  "display": "Smash Cut",
  "cat": "Camera",
  "source": [
    "claude-code-fast-mode",
    "claude-code-agent-view",
    "claude-financial-services"
  ],
  "desc": "Hard transition with a single-frame flash to land the impact. Beats fall before and after the cut, never during.",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": false,
  "variables": {}
}
</script>
<script data-effect-init>
window.LUMIERE_INIT = function init(card) {
      const o = card.querySelector("[data-old]")
      const n = card.querySelector("[data-new]")
      const f = card.querySelector("[data-flash]")
      gsap.set(o, { opacity: 1 })
      gsap.set(n, { opacity: 0 })
      gsap.set(f, { opacity: 0 })
      return () => {
        gsap.killTweensOf([o, n, f])
        gsap.set(o, { opacity: 1 })
        gsap.set(n, { opacity: 0 })
        gsap.set(f, { opacity: 0 })
        const tl = gsap.timeline({ delay: 0.7 })
        /* A → flash → B */
        tl.to(f, { opacity: 0.85, duration: 0.05, ease: "none" })
        tl.set(o, { opacity: 0 })
        tl.set(n, { opacity: 1 })
        tl.to(f, { opacity: 0, duration: 0.18, ease: "power2.out" })
        /* hold B, then B → flash → A */
        tl.to(f, { opacity: 0.85, duration: 0.05, ease: "none" }, "+=1.4")
        tl.set(n, { opacity: 0 })
        tl.set(o, { opacity: 1 })
        tl.to(f, { opacity: 0, duration: 0.18, ease: "power2.out" })
      }
    }
</script>
<script src="../_runtime.js"></script>
</body>
</html>

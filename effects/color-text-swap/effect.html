<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>Color + Text Swap · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.vp-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:22px}
.presence{
    display:inline-flex;align-items:center;gap:8px;
    font-family:'Geist Mono',monospace;font-size:13px;color:var(--ink);
    background:var(--paper-2);border:1px solid var(--line);
    border-radius:999px;padding:8px 14px;
  }
.pres-dot{width:7px;height:7px;border-radius:50%;background:var(--signal-blue);display:inline-block}
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="color-text-swap"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='vp-stage'><div class='presence' data-pr>
      <span class='pres-dot' data-pd></span>
      <span data-pt>ready</span>
    </div></div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "color-text-swap",
  "display": "Color + Text Swap",
  "cat": "UI",
  "source": [
    "claude-financial-services"
  ],
  "desc": "Dot and text color tween smoothly between states. Text label swaps at the midpoint. Use for presence pills, state badges.",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": false,
  "variables": {}
}
</script>
<script data-effect-init>
window.LUMIERE_INIT = function init(card) {
      const dot = card.querySelector("[data-pd]")
      const txt = card.querySelector("[data-pt]")
      const colorOf = name => getComputedStyle(document.documentElement)
        .getPropertyValue("--" + name).trim()
      const set = (label, varName) => {
        txt.textContent = label
        const c = colorOf(varName)
        gsap.to(dot, { backgroundColor: c, duration: 0.35, ease: "sine.inOut" })
        gsap.to(txt, { color: c, duration: 0.35, ease: "sine.inOut" })
      }
      txt.textContent = "ready"
      const gc = colorOf("proof-green")
      dot.style.backgroundColor = gc
      txt.style.color = gc
      let timers = []
      return () => {
        timers.forEach(t => clearTimeout(t))
        timers = []
        gsap.killTweensOf([dot, txt])
        txt.textContent = "ready"
        const g = colorOf("proof-green")
        dot.style.backgroundColor = g
        txt.style.color = g
        const seq = [
          { label: "working", v: "signal-blue",  at: 900 },
          { label: "ready",   v: "proof-green",  at: 2600 },
          { label: "working", v: "signal-blue",  at: 4300 },
          { label: "ready",   v: "proof-green",  at: 6000 }
        ]
        seq.forEach(s => timers.push(setTimeout(() => set(s.label, s.v), s.at)))
      }
    }
</script>
<script src="../_runtime.js"></script>
</body>
</html>

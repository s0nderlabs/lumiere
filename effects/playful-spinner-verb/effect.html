<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>Playful Spinner + Verb · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.psv-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:22px;overflow:hidden}
.psv-block{position:relative;display:flex;align-items:center;justify-content:center;min-width:240px;max-width:100%;min-height:24px}
.psv-line{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    display:inline-flex;align-items:baseline;gap:7px;white-space:nowrap;
    font-family:'Geist Mono',monospace;font-size:14px;line-height:1;
  }
.psv-g{display:inline-flex;align-items:center;justify-content:center;width:16px;height:15px;vertical-align:-2px}
.psv-spin{display:block;will-change:transform}
.psv-verb{color:var(--ink);font-weight:500;letter-spacing:-0.01em}
.psv-meta{color:#8a8378;font-size:12px;font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
html.theme-dark .psv-meta{color:#a09a8e}
.psv-result{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    display:inline-flex;align-items:center;gap:8px;white-space:nowrap;
    font-family:'Geist Mono',monospace;font-size:14px;line-height:1;
  }
.psv-check{
    display:inline-block;width:14px;height:14px;border-radius:50%;
    background:var(--proof-green);position:relative;flex:none;
  }
.psv-check::after{
    content:'';position:absolute;left:4.5px;top:2.5px;width:3px;height:6px;
    border:solid #fff;border-width:0 1.6px 1.6px 0;transform:rotate(42deg);
  }
.psv-result-text{color:var(--ink);font-weight:500;letter-spacing:-0.01em}
.psv-result-meta{color:#8a8378;font-size:12px;font-variant-numeric:tabular-nums}
html.theme-dark .psv-result-meta{color:#a09a8e}
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="playful-spinner-verb"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='psv-stage'>
    <div class='psv-block'>
      <div class='psv-line' data-psv-line>
        <span class='psv-g'><svg class='psv-spin' data-psv-spin viewBox='0 0 24 24' width='13' height='13' aria-hidden='true'><path d='M12 1.4 L13.9 10.1 L22.6 12 L13.9 13.9 L12 22.6 L10.1 13.9 L1.4 12 L10.1 10.1 Z' fill='#c8674f'/></svg></span><span class='psv-verb' data-psv-verb>Julienning…</span>
        <span class='psv-meta' data-psv-meta>(4s · ↑2.1k tokens)</span>
      </div>
      <div class='psv-result' data-psv-result>
        <span class='psv-check'></span><span class='psv-result-text'>Goal achieved</span>
        <span class='psv-result-meta'>· 7s · 4.9k tokens</span>
      </div>
    </div>
  </div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "playful-spinner-verb",
  "display": "Playful Spinner + Verb",
  "cat": "UI",
  "isNew": true,
  "source": [
    "claude-code-push-notifications",
    "claude-code-goal",
    "claude-code-agent-view"
  ],
  "desc": "Claude Code's whimsical active-task tell: a leading glyph sparkles through ·✛✳✶ beside a bold mono verb with live counters, then snaps to a green result line. From the Code push/goal/agent-view clips.",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": false,
  "variables": {}
}
</script>
<script data-effect-init>
window.LUMIERE_INIT = function init(card) {
    const line = card.querySelector("[data-psv-line]")
    const result = card.querySelector("[data-psv-result]")
    const spin = card.querySelector("[data-psv-spin]")
    const meta = card.querySelector("[data-psv-meta]")
    const counter = { s: 0, tok: 0 }
    let timers = []
    const renderMeta = () => {
      meta.textContent = "(" + Math.round(counter.s) + "s · ↑" + (counter.tok / 1000).toFixed(1) + "k tokens)"
    }
    /* the coral spark spins continuously, even at rest, so the card always reads as
       a live "working" spinner. Standalone tween (not a child of any replay timeline)
       so it survives across replays and never needs re-arming. */
    gsap.to(spin, { rotation: 360, duration: 2.2, ease: "none", repeat: -1, transformOrigin: "50% 50%" })
    /* contentful resting state: mid-task look, spark turning */
    const restMid = () => {
      gsap.set(line, { autoAlpha: 1 })
      gsap.set(result, { autoAlpha: 0, y: 4 })
      counter.s = 4; counter.tok = 2100; renderMeta()
    }
    restMid()
    const stopAll = () => {
      gsap.killTweensOf([counter, line, result])
      timers.forEach(t => clearTimeout(t)); timers = []
    }
    const runCycle = () => {
      /* self-clean each cycle so setTimeout handles + tweens never accumulate (re-replay + idle-loop safe) */
      timers.forEach(t => clearTimeout(t)); timers = []
      gsap.killTweensOf(counter)
      /* reset to fresh spin */
      gsap.set(line, { autoAlpha: 1 })
      gsap.set(result, { autoAlpha: 0, y: 4 })
      counter.s = 0; counter.tok = 0; renderMeta()
      /* live counters climb linearly while active */
      gsap.to(counter, { s: 7, tok: 4900, duration: 3.4, ease: "none", onUpdate: renderMeta })
      /* instant completion swap: spinner line out, result line in */
      timers.push(setTimeout(() => {
        renderMeta()
        gsap.set(line, { autoAlpha: 0 })
        gsap.fromTo(result, { autoAlpha: 0, y: 6 }, { autoAlpha: 1, y: 0, duration: 0.42, ease: "back.out(1.7)" })
      }, 3500))
      /* hold the result, then loop back into a fresh spin */
      timers.push(setTimeout(runCycle, 5200))
    }
    return () => {
      stopAll()
      restMid()
      timers.push(setTimeout(runCycle, 350))
    }
  }
</script>
<script src="../_runtime.js"></script>
</body>
</html>

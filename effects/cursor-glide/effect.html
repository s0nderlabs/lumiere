<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>Cursor Glide · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.vp-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:22px}
.cursor-stage{position:relative;width:90%;height:90%}
.cursor-target{
    position:absolute;left:60%;top:48%;
    font-family:'Geist Mono',monospace;font-size:11px;color:var(--ink);
    background:var(--paper-2);border:1px solid var(--line);border-radius:8px;
    padding:6px 12px;
  }
.cursor-svg{position:absolute;pointer-events:none}
.cursor-svg path{fill:var(--cream);stroke:var(--ink);stroke-width:2.4;stroke-linejoin:round;stroke-linecap:round}
.cursor-glide{width:34px;height:38px;left:5%;top:10%;opacity:0}
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="cursor-glide"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='vp-stage'><div class='cursor-stage' data-vpcur>
      <div class='cursor-target' data-target>0xa7c2…34af</div>
      <svg class='cursor-svg cursor-glide' viewBox='0 0 56 64' data-cur>
        <path d='M 6 4 C 7 2.6, 9.5 2.4, 10.8 3.6 L 41.5 28 C 43.4 29.5, 43 32.5, 40.6 33.3 L 27.3 37.5 C 26.2 37.85, 25.4 38.7, 25.1 39.8 L 21.2 50.4 C 20.3 53, 16.5 53.1, 15.5 50.5 L 5 8.8 C 4.6 7.3, 5 5.4, 6 4 Z'/>
      </svg>
    </div></div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "cursor-glide",
  "display": "Cursor Glide",
  "cat": "UI",
  "source": [
    "claude-code-fast-mode",
    "claude-financial-services"
  ],
  "desc": "Cursor glides from rest to a named anchor element with power3.inOut weight, then returns. Target resolved at tween start so layout shifts don't break it.",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": false,
  "variables": {}
}
</script>
<script data-effect-init>
window.LUMIERE_INIT = function init(card) {
      const cur = card.querySelector("[data-cur]")
      const t = card.querySelector("[data-target]")
      gsap.set(cur, { opacity: 1, left: "8%", top: "12%" })
      return () => {
        gsap.killTweensOf(cur)
        gsap.set(cur, { opacity: 1, left: "8%", top: "12%" })
        gsap.delayedCall(0.3, () => {
          const targetX = t.offsetLeft + t.offsetWidth * 0.2
          const targetY = t.offsetTop + t.offsetHeight * 0.4
          gsap.to(cur, { left: targetX + "px", top: targetY + "px", duration: 1.15, ease: "power3.inOut",
            onComplete() {
              gsap.to(cur, { left: "8%", top: "12%", duration: 0.8, ease: "power2.inOut", delay: 0.4 })
            }
          })
        })
      }
    }
</script>
<script src="../_runtime.js"></script>
</body>
</html>

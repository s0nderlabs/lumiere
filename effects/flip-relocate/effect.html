<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>FLIP Relocate · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.vp-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:22px}
.fr-stage{
    position:absolute;inset:0;
    background-image:
      radial-gradient(rgba(16,15,9,0.04) 1px, transparent 1px);
    background-size:20px 20px;
    background-position:4px 4px;
    border-radius:14px;
  }
.fr-slot{
    position:absolute;
    border:1.5px dashed var(--ink-2);
    border-radius:12px;
    background:rgba(255,255,255,0.30);
    opacity:0.9;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,0.4);
  }
.fr-slot-a{left:10px;top:16px;width:150px;height:60px}
.fr-slot-b{
    left:10px;top:16px;width:150px;height:60px;
    transform:translate(140px,100px) scale(0.6) rotate(-3deg);
    transform-origin:0 0;
    border-color:var(--ink);
    border-width:2px;
    background:rgba(16,15,9,0.05);
  }
.fr-card{
    position:absolute;left:10px;top:16px;
    width:150px;height:60px;
    background:var(--paper);
    border:1px solid var(--line-strong);
    border-radius:12px;
    padding:9px 13px;
    display:flex;flex-direction:column;justify-content:center;
    font-family:'Outfit',sans-serif;
    font-size:12px;color:var(--ink);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.55) inset,
      0 18px 38px -22px rgba(50,35,22,0.55),
      0 4px 10px -6px rgba(50,35,22,0.18);
    transform-origin:0 0;
    will-change:transform;
  }
.fr-card .fr-lbl{
    font-family:'Geist Mono',monospace;
    font-size:9px;color:var(--ink-3);
    text-transform:uppercase;letter-spacing:0.16em;
  }
.fr-card .fr-val{
    font-weight:500;font-size:14px;color:var(--ink);
    margin-top:2px;font-variant-numeric:tabular-nums;
    letter-spacing:0.01em;
  }
.fr-card .fr-meta{
    font-family:'Geist Mono',monospace;
    font-size:8px;color:var(--ink-3);
    letter-spacing:0.06em;margin-top:3px;
  }
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="flip-relocate"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='vp-stage'>
      <div class='fr-stage'>
        <div class='fr-slot fr-slot-a' data-slot='a'></div>
        <div class='fr-slot fr-slot-b' data-slot='b'></div>
        <div class='fr-card' data-morph>
          <span class='fr-lbl'>proof</span>
          <span class='fr-val'>0xa7c2&hellip;34af</span>
          <span class='fr-meta'>block 4&middot;482&middot;117</span>
        </div>
      </div>
    </div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "flip-relocate",
  "display": "FLIP Relocate",
  "cat": "Layer",
  "source": [
    "claude-code-agent-view"
  ],
  "desc": "Element morphs position, scale and rotation between two pre-defined slots. Same DOM node, new layout. Preserves identity across cuts (FLIP technique). Mirrors anima chainscan card morph (lines 2453-2456).",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": false,
  "variables": {}
}
</script>
<script data-effect-init>
window.LUMIERE_INIT = function init(card) {
      const m  = card.querySelector("[data-morph]")
      const sa = card.querySelector(".fr-slot-a")
      const sb = card.querySelector(".fr-slot-b")

      gsap.set(m,  { x: 0, y: 0, scale: 1, rotation: 0 })
      gsap.set(sa, { opacity: 0.7 })
      gsap.set(sb, { opacity: 0.5 })

      return () => {
        gsap.killTweensOf([m, sa, sb])
        gsap.set(m,  { x: 0, y: 0, scale: 1, rotation: 0 })
        gsap.set(sa, { opacity: 0.7 })
        gsap.set(sb, { opacity: 0.5 })

        const tl = gsap.timeline()
        tl.to(sb, { opacity: 0.8, duration: 0.30, ease: "power2.out" }, 0.40)
        tl.to(m, { x: 140, y: 100, scale: 0.6, rotation: -3,
                   duration: 1.05, ease: "power3.inOut" }, 0.70)
        tl.to(sa, { opacity: 0.3, duration: 0.40, ease: "power2.out" }, 1.40)
        tl.to(sa, { opacity: 0.7, duration: 0.30, ease: "power2.out" }, 3.10)
        tl.to(sb, { opacity: 0.35, duration: 0.30, ease: "power2.out" }, 3.10)
        tl.to(m, { x: 0, y: 0, scale: 1, rotation: 0,
                   duration: 1.05, ease: "power3.inOut" }, 3.40)
        tl.to([sa, sb], { opacity: 0.7, duration: 0.30, ease: "power2.out" }, 4.60)
      }
    }
</script>
<script src="../_runtime.js"></script>
</body>
</html>

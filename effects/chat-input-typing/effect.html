<!doctype html>
<html lang="en" class="theme-light">
<head>
<meta charset="utf-8"/>
<title>Chat Input Typing · lumiere effect</title>
<link rel="stylesheet" href="../_fonts/vendored.css">
<link rel="stylesheet" href="../_base.css">
<style data-effect-css>
.cit-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;padding:16px;gap:6px}
.cit-plus{width:28px;height:28px;border-radius:50%;background:#e8e7e4;display:flex;align-items:center;justify-content:center;color:#8a8a86;font-size:18px;flex-shrink:0;font-weight:300}
.cit-bar{display:flex;align-items:center;gap:6px;background:#f0efed;border-radius:999px;padding:7px 7px 7px 14px;width:290px;max-width:78%}
.cit-text{font-family:'Outfit',sans-serif;font-size:11px;font-weight:400;color:#1a1a1a;white-space:nowrap;overflow:hidden;flex:1;letter-spacing:-0.01em}
.cit-send{width:26px;height:26px;border-radius:50%;background:#000;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cit-send svg{width:12px;height:12px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div id="fit">
  <div id="card" class="card-sim"
       data-composition-id="chat-input-typing"
       data-stage-width="360" data-stage-height="240">
    <div class="viewport"><div class='cit-stage'>
      <div class='cit-plus'>+</div>
      <div class='cit-bar' data-cit-bar>
        <div class='cit-text' data-cit-text></div>
        <div class='cit-send'><svg viewBox='0 0 16 16'><path d='M8 12V4M8 4L4 8M8 4l4 4'/></svg></div>
      </div>
    </div></div>
  </div>
</div>
<script src="../_vendor/gsap.min.js"></script>
<script data-effect-meta type="application/json">
{
  "id": "chat-input-typing",
  "display": "Chat Input Typing",
  "cat": "Chat",
  "isNew": true,
  "source": [
    "claude-code-agent-view",
    "chatgpt-personal-finance"
  ],
  "desc": "ChatGPT composer input bar with text typing character-by-character inside a fixed-width bar. Send button right, plus button left.",
  "stage": {
    "width": 360,
    "height": 240
  },
  "scrubbable": false,
  "variables": {}
}
</script>
<script data-effect-init>
window.LUMIERE_INIT = function init(card) {
      const bar = card.querySelector("[data-cit-bar]")
      const text = card.querySelector("[data-cit-text]")
      const msg = "Am I paying for subscriptions I don't need?"
      let timer = null
      text.textContent = msg
      return () => {
        if (timer) clearInterval(timer)
        text.textContent = ""
        let idx = 0
        timer = setInterval(() => {
          if (idx < msg.length) {
            text.textContent = msg.slice(0, idx + 1)
            idx++
          } else {
            clearInterval(timer)
            timer = null
          }
        }, 45)
      }
    }
</script>
<script src="../_runtime.js"></script>
</body>
</html>
